name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write    # Crucial for pushing commits, tags, and creating releases
  id-token: write    # Crucial for PyPI trusted publishing OIDC authentication

jobs:
  release:
    name: Semantic Release & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Critical: fetch all git history for semantic analysis of conventional commits
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # Install python-semantic-release in the runner environment
      - name: Install python-semantic-release
        run: |
          uv pip install --system python-semantic-release

      # Run semantic-release version to check if a new version is warranted.
      # If so, it updates pyproject.toml, builds CHANGELOG.md, commits, tags, and pushes back to main.
      - name: Run semantic-release version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if we should release and perform version bump + git commit/tag push
          semantic-release -v version

      # Build the final wheel and source distribution artifacts
      - name: Build package
        run: uv build

      # Run semantic-release publish to upload built artifacts to GitHub Releases
      - name: Publish to GitHub Releases
        id: publish-gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release -v publish

      # Publish the built distribution wheels to PyPI using PyPA official OIDC Action
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
