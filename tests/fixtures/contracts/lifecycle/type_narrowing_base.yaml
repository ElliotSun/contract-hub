          - property: lifecycleStatus
            value: active
      - id: payload_hash
        name: payload_hash
        physicalName: payload_hash
        logicalType: binary
        physicalType: VARBINARY(64)
        customProperties:
          - property: lifecycleStatus
            value: active
      - id: quantity
        name: quantity
        physicalName: quantity
        logicalType: integer
        physicalType: BIGINT
        customProperties:
          - property: lifecycleStatus
            value: active
      - id: status_code
        name: status_code
        physicalName: status_code
        logicalType: string
        physicalType: VARCHAR(16)
        customProperties:
          - property: lifecycleStatus
            value: active
        enum:
          - ACTIVE
          - INACTIVE
          - PENDING
