    name: narrowing_table
    physicalName: narrowing_table
    physicalType: table
    customProperties:
      - property: lifecycleStatus
        value: active
    properties:
      - id: short_code
        name: short_code
        physicalName: short_code
        logicalType: string
        physicalType: VARCHAR(32)
