version: 1.0.0
schema:
  - name: users
    properties:
      - name: id
        type: string
  - name: loyalty_members
    properties:
      - name: customer_id
        type: string
  - name: orders
    properties:
      - name: id
        type: string
      - name: customer_id
        type: string
        relationships:
          - to: users.id
            customProperties:
              - property: "graph_semantic.edge_label"
                value: "PLACED_BY"
          - to: loyalty_members.customer_id
            customProperties:
              - property: "graph_export.is_junction_edge"
                value: true
      - name: missing_label_field
        type: string
        relationships:
          - to: products.id
