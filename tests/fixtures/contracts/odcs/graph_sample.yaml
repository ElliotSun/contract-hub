kind: DataContract
apiVersion: v3.1.0
id: my-contract
status: active
name: test
version: 1.0.0
schema:
  - name: users
    properties:
      - name: id
        logicalType: string
      - name: email
        logicalType: string
        classification: pii
  - name: loyalty_members
    properties:
      - name: customer_id
        logicalType: string
  - name: orders
    properties:
      - name: id
        logicalType: string
      - name: customer_id
        logicalType: string
        relationships:
          - to: users.id
            customProperties:
              - property: "graph_semantic.edge_label"
                value: "PLACED_BY"
          - to: loyalty_members.customer_id
            customProperties:
              - property: "graph_export.is_junction_edge"
                value: true
      - name: missing_label_field
        logicalType: string
        relationships:
          - to: products.id

  - name: order_items
    properties:
      - name: order_id
        logicalType: string
      - name: product_id
        logicalType: string
  - name: product_inventory
    properties:
      - name: order_id
        logicalType: string
      - name: product_id
        logicalType: string

  - name: employees
    relationships:
      - type: foreignKey
        from: manager_id
        to: employees.id
    properties:
      - name: id
        logicalType: string
      - name: manager_id
        logicalType: string

  - name: products
    properties:
      - name: id
        logicalType: string

  - name: complex_junction
    customProperties:
      - property: "graph_export.is_junction_edge"
        value: true
    relationships:
      - type: foreignKey
        from:
          - complex_junction.order_id
          - complex_junction.product_id
        to:
          - order_items.order_id
          - order_items.product_id
        customProperties:
          - property: "graph_export.is_source"
            value: true
          - property: "graph_semantic.edge_label"
            value: "COMPLEX_JUNCTION"
      - type: foreignKey
        from:
          - complex_junction.inv_order_id
          - complex_junction.inv_product_id
        to:
          - product_inventory.order_id
          - product_inventory.product_id
    properties:
      - name: active
        logicalType: boolean

  - name: reversed_order_edge
    properties:
      - name: id
        logicalType: string
      - name: product_id_reversed
        logicalType: string
        relationships:
          - to: products.id
            customProperties:
              - property: "graph_export.is_source"
                value: true
              - property: "graph_semantic.edge_label"
                value: "HAS_ORDER"
  - name: user_products_junction
    customProperties:
      - property: "graph_export.is_junction_edge"
        value: true
    properties:
      - name: active
        logicalType: boolean
      - name: score
        logicalType: float
      - name: source_user_id
        logicalType: string
        relationships:
          - to: users.id
            customProperties:
              - property: "graph_export.is_source"
                value: true
              - property: "graph_semantic.edge_label"
                value: "PURCHASED"
      - name: target_product_id
        logicalType: string
        relationships:
          - to: products.id
