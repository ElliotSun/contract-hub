version: 1.0.0
schema:
  - name: users
    properties:
      - name: id
        logicalType: string
  - name: loyalty_members
    properties:
      - name: customer_id
        logicalType: string
  - name: orders
    properties:
      - name: id
        logicalType: string
      - name: customer_id
        logicalType: string
        relationships:
          - to: users.id
            customProperties:
              - property: "graph_semantic.edge_label"
                value: "PLACED_BY"
          - to: loyalty_members.customer_id
            customProperties:
              - property: "graph_export.is_junction_edge"
                value: true
      - name: missing_label_field
        logicalType: string
        relationships:
          - to: products.id
      - name: product_id_reversed
        logicalType: string
        relationships:
          - to: products.id
            customProperties:
              - property: "graph_export.is_source"
                value: true
              - property: "graph_semantic.edge_label"
                value: "HAS_ORDER"
  - name: user_products_junction
    customProperties:
      - property: "graph_export.is_junction_edge"
        value: true
    properties:
      - name: active
        logicalType: boolean
      - name: score
        logicalType: float
      - name: source_user_id
        logicalType: string
        relationships:
          - to: users.id
            customProperties:
              - property: "graph_export.is_source"
                value: true
              - property: "graph_semantic.edge_label"
                value: "PURCHASED"
      - name: target_product_id
        logicalType: string
        relationships:
          - to: products.id
