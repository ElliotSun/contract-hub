apiVersion: v3.1.0
kind: DataContract
id: numeric-precision
name: numeric-precision
version: 1.0.0
status: active
domain: finance
dataProduct: numeric-precision
description:
  purpose: Covers decimal precision and scale variants for exporter and lifecycle tests.
schema:
  - id: numeric_table
    name: numeric_metrics
    physicalName: numeric_metrics
    physicalType: table
    customProperties:
      - property: lifecycleStatus
        value: active
    properties:
      - id: amount_minor
        name: amount_minor
        physicalName: amount_minor
        logicalType: number
        physicalType: DECIMAL(10,2)
        customProperties:
          - property: lifecycleStatus
            value: active
        logicalTypeOptions:
          precision: 10
          scale: 2
      - id: fx_rate
        name: fx_rate
        physicalName: fx_rate
        logicalType: number
        physicalType: DECIMAL(18,6)
        customProperties:
          - property: lifecycleStatus
            value: active
        logicalTypeOptions:
          precision: 18
          scale: 6
      - id: pnl_value
        name: pnl_value
        physicalName: pnl_value
        logicalType: number
        physicalType: DECIMAL(38,10)
        customProperties:
          - property: lifecycleStatus
            value: active
        logicalTypeOptions:
          precision: 38
          scale: 10
      - id: quantity
        name: quantity
        physicalName: quantity
        logicalType: integer
        physicalType: BIGINT
        customProperties:
          - property: lifecycleStatus
            value: active
